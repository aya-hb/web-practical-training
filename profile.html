                    <li data-title="好きな言葉" 
                        data-text="「同じ場所にとどまるためには、全力で走り続ければならない」です。

                        data-img="img/4_Tyousyo.jpg"> <a href="#">

                        </div>

                    </li>
                    <li data-title="就活の軸"

                        data-img="img/4_Tyousyo.jpg"> <a href="#">

                        </div>
                        </a>
                    </li>

                                <p style="color: #ffc0cb;">してみたいこと</p>
                            </div>
                        </a>
                    </li>
                    <li data-title="好きな食べ物" 
                        data-text="おにぎりとラーメンです。

                                    ラーメンは、担々麺が好きです！" 
                        data-img="img/5_Sky.jpeg"> <a href="#">
                            <div class="item5">
                                <p style="color: #ffc0cb;">好きな食べ物</p>
                            </div>
                        </a>
                    </li>
                    <li data-title="チャームポイント" 
                        data-text="笑顔です！
                                    私は、自分の笑顔が大好きです。常に笑顔にいることを心がけているので、人脈作りに自信があります。" 
                        data-img="img/5_Sky.jpeg"> <a href="#">
                            <div class="item5">
                                <p style="color: #ffc0cb;">チャームポイント</p>
                            </div>
                        </a>
                    </li>
                    <li data-title="自分の短所" 
                        data-text="頑固な所です。

                                    一度やると決めた事は最後までやりたいと思って取り組みます。" 
                        data-img="img/5_Sky.jpeg"> <a href="#">
                            <div class="item5">
                                <p style="color: #ffc0cb;">自分の短所</p>
                            </div>
                        </a>
                    </li>
                    <li data-title="特技" 
                        data-text="手話です。

                        data-img="img/5_Sky.jpeg"> <a href="#">

                            </div>
